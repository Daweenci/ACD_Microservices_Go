services:

  # ─── Datenbank: Auth ───────────────────────────────────────────────
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AUTH_DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Datenbank: Cart ──────────────────────────────────────────────
  cart-db:
    image: postgres:16-alpine
    container_name: cart-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${CART_DB_USER}
      POSTGRES_PASSWORD: ${CART_DB_PASSWORD}
      POSTGRES_DB: ${CART_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - cart-db-data:/var/lib/postgresql/data
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CART_DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── Microservice: Auth ────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: ${AUTH_DB_USER}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      DB_NAME: ${AUTH_DB_NAME}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      auth-db:
        condition: service_healthy
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ─── Microservice: Cart ────────────────────────────────────────────
  cart-service:
    build:
      context: ./cart-service
      dockerfile: Dockerfile
    container_name: cart-service
    restart: unless-stopped
    environment:
      DB_HOST: cart-db
      DB_PORT: 5432
      DB_USER: ${CART_DB_USER}
      DB_PASSWORD: ${CART_DB_PASSWORD}
      DB_NAME: ${CART_DB_NAME}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      cart-db:
        condition: service_healthy
    networks:
      - microservices-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  auth-db-data:
  cart-db-data:

networks:
  microservices-net:
    driver: bridge