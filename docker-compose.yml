services:

  # ─── Datenbank: Auth ───────────────────────────────────────────────
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - microservices-net

  # ─── Datenbank: Shop ──────────────────────────────────────────────
  shop-db:
    image: postgres:16-alpine
    container_name: shop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${SHOP_DB_USER}
      POSTGRES_PASSWORD: ${SHOP_DB_PASSWORD}
      POSTGRES_DB: ${SHOP_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - shop-db-data:/var/lib/postgresql/data
    networks:
      - microservices-net

  # ─── Microservice: Auth ────────────────────────────────────────────
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_USER: ${AUTH_DB_USER}
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      DB_NAME: ${AUTH_DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      - auth-db
    networks:
      - microservices-net

  # ─── Microservice: Shop ────────────────────────────────────────────
  shop-service:
    build:
      context: ./shop-service
      dockerfile: Dockerfile
    container_name: shop-service
    restart: unless-stopped
    environment:
      DB_HOST: shop-db
      DB_PORT: 5432
      DB_USER: ${SHOP_DB_USER}
      DB_PASSWORD: ${SHOP_DB_PASSWORD}
      DB_NAME: ${SHOP_DB_NAME}
      AUTH_SERVICE_URL: http://auth-service:8081
      PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      - shop-db
      - auth-service
    networks:
      - microservices-net

volumes:
  auth-db-data:
  shop-db-data:

networks:
  microservices-net:
    driver: bridge